services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: hiddengem_db
      MARIADB_USER: hiddengem_user
      MARIADB_PASSWORD: hiddengem_password
      MARIADB_ROOT_PASSWORD: hiddengem_root_password
    volumes:
      - db_data:/var/lib/mysql
      - ./api/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./api/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "3306:3306"

  api:
    build:
      context: ./api
    environment:
      PORT: 3001
      NODE_ENV: production
      APP_ORIGIN: http://localhost:8080
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: hiddengem_user
      DB_PASSWORD: hiddengem_password
      DB_NAME: hiddengem_db
      JWT_SECRET: change-this-secret-before-production
      UPLOAD_DIR: /app/uploads
      PUBLIC_UPLOAD_BASE_URL: /uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  db_data:
  uploads:
